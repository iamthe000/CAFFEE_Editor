# .github/workflows/pypi_publish.yml

name: Publish Python Package to PyPI

on:
  # Trigger the workflow when a release is published
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only publish to PyPI if the release is NOT marked as a pre-release
    if: github.event.release.prerelease == false
    permissions:
      # Grant OIDC token permissions for trusted publishing
      id-token: write
    # environment: pypi # (Optional) Uncomment this if you are using a PyPI environment
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python environment
        uses: actions/setup-python@v5
        with:
          # Match the Python version supported by your project
          python-version: '3.x' 
          
      - name: 🏗️ Install build tools
        # build: creates distribution files
        run: pip install build

      - name: 🧱 Build Source and Wheel distributions
        # Creates .tar.gz and .whl files in the dist/ directory
        run: python -m build
        
      - name: 📤 Publish package to PyPI using trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1
          
      - name: ✅ Check release tag (Optional)
        # Output the executed tag to the log
        run: echo "Successfully deployed tag ${{ github.ref_name }}"
